version: "3"

tasks:
  docker:start:
    desc: Build and start the Go WebSocket server in Docker
    cmds:
      - powershell -Command "docker build -t watchtogeather-server:dev '{{.TASKFILE_DIR}}/server'"
      - cmd /c "docker rm -f watchtogeather-server-dev 1>nul 2>nul & docker run -d --name watchtogeather-server-dev -p 8080:8080 watchtogeather-server:dev && echo Started Docker container watchtogeather-server-dev on port 8080"

  docker:stop:
    desc: Stop the development Docker container without removing it
    cmds:
      - cmd /c "docker stop watchtogeather-server-dev && echo Stopped Docker container watchtogeather-server-dev || echo Docker container is not running"

  docker:destroy:
    desc: Stop and remove the development Docker container
    cmds:
      - cmd /c "docker rm -f watchtogeather-server-dev && echo Removed Docker container watchtogeather-server-dev || echo Docker container does not exist"

  docker:logs:
    desc: Tail logs from the development Docker container
    cmds:
      - cmd /c "docker logs --tail 100 -f watchtogeather-server-dev"
